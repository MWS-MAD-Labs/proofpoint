services:
  # ============================================
  # Next.js Application (Frontend + API)
  # ============================================
  app:
    # image: ghcr.io/faisalnh/proofpoint-dashboard:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proofpoint-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-proofpoint}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-proofpoint}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-proofpoint}
      POSTGRES_USER: ${POSTGRES_USER:-proofpoint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://10.100.0.142:3060}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      AUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL_INTERNAL: "http://localhost:3000"
      AUTH_TRUST_HOST: "true"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-evidence}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_DEBUG: ${EMAIL_DEBUG:-false}
      EMAIL_SERVICE: ${EMAIL_SERVICE:-nodemailer}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@proofpoint.local}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-ProofPoint Dashboard}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      RESEND_API_KEY: ${RESEND_API_KEY}
      SKIP_MIGRATIONS: ${SKIP_MIGRATIONS:-false}
    ports:
      - "3060:3000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/" ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: proofpoint-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-proofpoint}
      POSTGRES_USER: ${POSTGRES_USER:-proofpoint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proofpoint}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MinIO S3-Compatible Storage
  # ============================================
  minio:
    image: minio/minio
    container_name: proofpoint-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data:
  minio-data: