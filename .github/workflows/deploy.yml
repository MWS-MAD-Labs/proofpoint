name: CI/CD Pipeline

on:
  push:
    branches: [main, Staging]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  # Shared: Test & Build (runs for both branches)
  # ─────────────────────────────────────────────
  test:
    name: Run Tests & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

  # ─────────────────────────────────────────────
  # Build & Push Docker image
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "value=latest" >> $GITHUB_OUTPUT
          else
            echo "value=staging" >> $GITHUB_OUTPUT
          fi


      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.value }}
            type=sha,prefix=${{ github.ref_name == 'main' && 'main' || 'staging' }}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Deploy: Production  (main branch only)
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    environment: production
    steps:
      - name: Call Komodo Webhook (Production)
        env:
          WEBHOOK_URL: ${{ secrets.KOMODO_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.KOMODO_WEBHOOK_SECRET }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "Error: KOMODO_WEBHOOK_URL secret not found. Manual redeploy required."
            exit 1
          fi

          PAYLOAD='{"event":"push","ref":"refs/heads/main","repository":{"full_name":"${{ github.repository }}"}}'

          if [ -n "$WEBHOOK_SECRET" ]; then
            echo "Triggering signed Komodo redeploy (production)..."
            SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/^.* //')
            curl -X POST \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Event: push" \
              -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
              -d "$PAYLOAD" \
              "$WEBHOOK_URL"
          else
            echo "Triggering unsigned Komodo redeploy (production)..."
            curl -X POST \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Event: push" \
              -d "$PAYLOAD" \
              "$WEBHOOK_URL"
          fi

  # ─────────────────────────────────────────────
  # Deploy: Staging  (staging branch only)
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref_name == 'Staging'
    environment: staging
    steps:
      - name: Call Komodo Webhook (Staging)
        env:
          WEBHOOK_URL: ${{ secrets.KOMODO_STAGING_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.KOMODO_STAGING_WEBHOOK_SECRET }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "Error: KOMODO_STAGING_WEBHOOK_URL secret not found."
            echo "Expected format: https://<komodo-host>/listener/github/procedure/proofpoint-st-redeploy/Staging"
            exit 1
          fi

          echo "Webhook URL: $WEBHOOK_URL"

          # Payload matches what GitHub sends on push
          PAYLOAD='{"event":"push","ref":"refs/heads/Staging","repository":{"full_name":"${{ github.repository }}"}}'

          if [ -n "$WEBHOOK_SECRET" ]; then
            echo "Triggering signed Komodo procedure redeploy (staging)..."
            SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/^.* //')
            echo "Computed signature: sha256=$SIGNATURE"
            curl --fail-with-body -v --max-time 30 -X POST \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Event: push" \
              -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
              -d "$PAYLOAD" \
              "$WEBHOOK_URL"
          else
            echo "Warning: KOMODO_STAGING_WEBHOOK_SECRET not set – sending unsigned request."
            echo "This will be rejected if the procedure has webhook_secret configured."
            curl --fail-with-body -v --max-time 30 -X POST \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Event: push" \
              -d "$PAYLOAD" \
              "$WEBHOOK_URL"
          fi
